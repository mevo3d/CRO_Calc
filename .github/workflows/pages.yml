name: Publicar en GitHub Pages

# Pages ya está activo sirviendo la rama gh-pages; este workflow la mantiene
# sincronizada con main para que cada merge actualice el sitio.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git push origin HEAD:gh-pages --force
